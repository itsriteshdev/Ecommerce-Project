spring.application.name=Ecommerce

# Database configuration using the IPv4-compatible Supabase Connection Pooler
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres.wsztijgbutizfgehyjwm}
spring.datasource.password=${DB_PASSWORD:Riteshprasad@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate properties
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Session JDBC settings (if needed)
spring.session.store-type=none

# Hikari Connection Pool settings (adjusted for Supabase short connection lifetime)
spring.datasource.hikari.max-lifetime=45000
spring.datasource.hikari.keepalive-time=15000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
